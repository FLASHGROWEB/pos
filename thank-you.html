<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="thank-you-container">
        <div class="icon-container">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>
        
        <h1>Thank You!</h1>
        <p class="subtitle">Your order has been successfully placed.</p>
        
        <div class="info-box">
            <p>Once your order is processed, we will email you with your order status and tracking details you can now safely either press back to shop or close the window for the payment Gateway.</p>
        </div>

        <a href="/" class="btn-home">Return to Shop</a>
    </div>
</body>
