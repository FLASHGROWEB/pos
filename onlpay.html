<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPS | Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .payment-box { background: #0a0a0a; border: 1px solid #222; border-radius: 32px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
        .method-btn { border: 1px solid #222; padding: 12px; border-radius: 14px; font-size: 10px; font-weight: 800; letter-spacing: 1px; transition: 0.2s; color: #555; }
        .method-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
        #status-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(10px); }
        .spinner { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input::placeholder { color: #3f3f46; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div id="status-overlay">
        <div class="p-8">
            <div id="status-loader" class="spinner"></div>
            <h2 id="status-title" class="text-xl font-bold mb-2 uppercase italic text-blue-500 tracking-tighter">Processing</h2>
            <p id="status-text" class="text-zinc-500 text-[10px] uppercase tracking-[3px] leading-relaxed max-w-[220px] mx-auto">Sending Notification... Please wait for a confirmation email.</p>
        </div>
    </div>

    <div id="main-ui" class="payment-box text-center hidden">
        <h1 class="text-xl font-black italic mb-6 tracking-tighter uppercase">SHOPS <span class="text-blue-500">PAY</span></h1>
        
        <div id="method-selector" class="flex gap-2 mb-8 hidden">
            <button id="btn-interac" onclick="setMethod('interac')" class="method-btn flex-1 active">INTERAC</button>
            <button id="btn-crypto" onclick="setMethod('crypto')" class="method-btn flex-1 uppercase">CRYPTO</button>
        </div>

        <div class="mb-8">
            <p class="text-zinc-500 text-[10px] uppercase tracking-[3px] mb-1 font-bold">Total Due</p>
            <div id="display-amt" class="text-5xl font-mono font-bold text-white tracking-tighter">$0.00</div>
        </div>

        <div class="bg-white p-4 rounded-[2rem] inline-block mb-8 shadow-2xl">
            <div id="qrcode"></div>
        </div>

        <div id="interac-details" class="space-y-4">
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <p class="text-zinc-500 text-[10px] uppercase font-bold mb-1 tracking-widest">Required Memo</p>
                <div id="transaction-id" class="text-xl font-mono text-blue-400 font-black tracking-widest">-----</div>
            </div>
            <p class="text-[10px] text-zinc-500 uppercase tracking-tighter text-center">
                Send e-Transfer to: <br>
                <span id="display-email" class="text-white font-bold">...</span>
            </p>
        </div>

        <div id="crypto-details" class="hidden space-y-4 text-center">
            <div class="bg-zinc-900/50 p-3 rounded-2xl border border-zinc-800">
                <p class="text-zinc-500 text-[10px] uppercase font-bold mb-1 tracking-widest" id="crypto-label">LTC ADDRESS</p>
                <div id="display-crypto" class="text-[9px] font-mono text-blue-400 break-all px-2 leading-normal">...</div>
            </div>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Send the exact amount shown above.</p>
        </div>

        <div class="mt-8 text-left">
            <label class="text-zinc-500 text-[10px] uppercase font-bold ml-2 mb-1 block tracking-widest">Your Contact Email</label>
            <input type="email" id="user-email" placeholder="Enter your email" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-4 px-4 text-sm focus:outline-none focus:border-blue-500 transition-colors">
        </div>

        <button onclick="handleCompletion()" class="w-full py-5 mt-6 rounded-2xl bg-blue-600 text-white font-black text-sm uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Complete Payment</button>
        <button onclick="window.close()" class="w-full py-3 mt-2 text-zinc-700 font-bold text-[10px] uppercase tracking-widest">Cancel</button>
    </div>

    <script>
        // --- YOUR ACTIVE EMAILJS CREDENTIALS ---
        const EMAILJS_PUBLIC_KEY = "g0rN57iiMkcVPLrE-"; 
        const EMAILJS_SERVICE_ID = "service_vji7dpj";
        const EMAILJS_TEMPLATE_ID = "template_bb4s30u";

        const WHITELIST = [
            {
                url: "flashgroweb.github.io/SHOPPOS",
                mode: "hybrid",
                email: "kashog20210@gmail.com",
                cryptoType: "LTC",
                cryptoAddr: "ltc1qg2hwndxygxcss2gcnr6fzg6lxda8jg4z2qvvwf", // <--- UPDATE THIS
                redirect: "https://flashgroweb.github.io/SHOPPOS/"
            }
        ];

        let activeConfig = null;
        let currentAmount = "0.00";
        let currentMethod = 'interac';
        let txId = "";

        // Start EmailJS
        (function() { emailjs.init(EMAILJS_PUBLIC_KEY); })();

        function clean(u) { return u.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '').toLowerCase().trim(); }

        function init() {
            const p = new URLSearchParams(window.location.search);
            currentAmount = p.get('amt') || "0.00";
            let c = clean(document.referrer || window.location.href);
            activeConfig = WHITELIST.find(i => c.includes(clean(i.url)));
            
            if (activeConfig) {
                document.getElementById('display-amt').innerText = `$${parseFloat(currentAmount).toFixed(2)}`;
                txId = "LS-" + Math.random().toString(36).substr(2, 5).toUpperCase();
                document.getElementById('transaction-id').innerText = txId;
                document.getElementById('display-email').innerText = activeConfig.email;
                document.getElementById('display-crypto').innerText = activeConfig.cryptoAddr;
                document.getElementById('crypto-label').innerText = activeConfig.cryptoType + " Address";
                
                if (activeConfig.mode === "hybrid") {
                    document.getElementById('method-selector').classList.remove('hidden');
                    document.getElementById('btn-crypto').innerText = activeConfig.cryptoType;
                }
                
                setMethod(activeConfig.mode === "hybrid" ? 'interac' : activeConfig.mode);
                document.getElementById('main-ui').classList.remove('hidden');
            } else {
                document.body.innerHTML = "<div style='color:grey; text-align:center; margin-top:50px;'>Session Error: Unauthorized Origin</div>";
            }
        }

        function setMethod(m) {
            currentMethod = m;
            const q = document.getElementById("qrcode"); q.innerHTML = "";
            document.getElementById('btn-interac').className = `method-btn flex-1 ${m === 'interac' ? 'active' : ''}`;
            document.getElementById('btn-crypto').className = `method-btn flex-1 ${m === 'crypto' ? 'active' : ''}`;
            
            if (m === 'interac') {
                document.getElementById('interac-details').classList.remove('hidden');
                document.getElementById('crypto-details').classList.add('hidden');
                // Standard Interac QR (mailto)
                new QRCode(q, { text: `mailto:${activeConfig.email}?subject=Payment ${txId}&body=Memo: ${txId}`, width: 160, height: 160 });
            } else {
                document.getElementById('interac-details').classList.add('hidden');
                document.getElementById('crypto-details').classList.remove('hidden');
                // Standard Crypto Address QR
                new QRCode(q, { text: activeConfig.cryptoAddr, width: 160, height: 160 });
            }
        }

        async function handleCompletion() {
            const userEmail = document.getElementById('user-email').value;
            if (!userEmail.includes('@')) { alert("Please enter a valid email address."); return; }

            document.getElementById('status-overlay').style.display = 'flex';

            const templateParams = {
                owner_email: activeConfig.email,
                customer_email: userEmail,
                amount: currentAmount,
                method: currentMethod.toUpperCase(),
                txid: txId,
                store_url: window.location.href
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                .then(() => {
                    // Success: Wait 4 seconds to show the message then redirect
                    setTimeout(() => {
                        if (activeConfig.redirect) window.location.href = activeConfig.redirect;
                        else window.close();
                    }, 4000);
                }, (error) => {
                    console.error("EmailJS Error:", error);
                    alert("Submission failed. Please check your internet connection.");
                    document.getElementById('status-overlay').style.display = 'none';
                });
        }

        init();
    </script>
</body>
</html>
