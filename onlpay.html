<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPS | Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .payment-box { background: #0a0a0a; border: 1px solid #222; border-radius: 32px; padding: 2rem; width: 100%; max-width: 400px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="payment-box text-center">
        <h1 class="text-xl font-black italic mb-6">SHOPS <span class="text-blue-500">PAY</span></h1>
        
        <div class="mb-8">
            <p class="text-zinc-500 text-[10px] uppercase tracking-[3px] mb-1">Total Amount</p>
            <div id="display-amt" class="text-5xl font-mono font-bold text-white">$0.00</div>
        </div>

        <div class="bg-white p-4 rounded-2xl inline-block mb-6">
            <div id="qrcode"></div>
        </div>

        <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800 mb-6">
            <p class="text-zinc-500 text-[10px] uppercase font-bold mb-2">Required Memo</p>
            <div id="transaction-id" class="text-xl font-mono text-blue-400 font-bold tracking-widest">-----</div>
            <p class="text-[9px] text-zinc-600 mt-2">Include this code in your Interac memo to verify payment.</p>
        </div>

        <p class="text-[11px] text-zinc-400 mb-6 px-4">
            Scan the QR code to open your banking app, or send transfer to: <br>
            <span id="display-email" class="text-white font-bold">loading...</span>
        </p>

        <button onclick="window.close()" class="w-full py-4 rounded-xl bg-zinc-900 text-zinc-500 font-bold text-xs uppercase tracking-widest">Cancel Payment</button>
    </div>

    <script>
        // 1. Config (Your GitHub Whitelist URL)
        const API_POOL = "YOUR_RAW_GITHUB_URL_HERE";

        async function initCheckout() {
            // Get Amount from URL (e.g., ?amt=10.00)
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amt') || "0.00";
            document.getElementById('display-amt').innerText = `$${amount}`;

            // Generate Unique Transaction ID (Never the same)
            const txId = "LS-" + Math.random().toString(36).substr(2, 4).toUpperCase() + "-" + Math.random().toString(36).substr(2, 4).toUpperCase();
            document.getElementById('transaction-id').innerText = txId;

            // Verify Domain & Get Email
            try {
                const response = await fetch(API_POOL);
                const data = await response.text();
                // We check the "Referrer" (the site that opened this popup)
                const ref = document.referrer ? new URL(document.referrer).hostname : window.location.hostname;
                
                const lines = data.split('\n');
                const match = lines.find(l => l.includes(ref));
                
                if (match) {
                    const email = match.split(',')[1].trim();
                    document.getElementById('display-email').innerText = email;
                    
                    // Generate QR
                    const qrContent = `mailto:${email}?subject=Payment ${txId}&body=Amount: $${amount}%0D%0AMemo: ${txId}`;
                    new QRCode(document.getElementById("qrcode"), {
                        text: qrContent,
                        width: 180,
                        height: 180,
                        colorDark : "#000000",
                        colorLight : "#ffffff"
                    });
                } else {
                    alert("Unauthorized Domain");
                }
            } catch (e) {
                console.error(e);
            }
        }

        initCheckout();
    </script>
</body>
</html>
