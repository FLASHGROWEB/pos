<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPS | Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .payment-box { background: #0a0a0a; border: 1px solid #222; border-radius: 32px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        #error-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 100; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div id="error-screen">
        <div class="max-w-xs">
            <h1 class="text-red-500 font-black italic text-2xl mb-2">ACCESS DENIED</h1>
            <p id="error-msg" class="text-zinc-500 text-[10px] uppercase tracking-widest">Invalid Session</p>
        </div>
    </div>

    <div id="main-ui" class="payment-box text-center hidden">
        <h1 class="text-xl font-black italic mb-8">SHOPS <span class="text-blue-500">PAY</span></h1>
        
        <div class="mb-10">
            <p class="text-zinc-500 text-[10px] uppercase tracking-[3px] mb-2 font-bold">Total Amount</p>
            <div id="display-amt" class="text-6xl font-mono font-bold text-white">$0.00</div>
        </div>

        <div class="bg-white p-5 rounded-3xl inline-block mb-8 shadow-inner">
            <div id="qrcode"></div>
        </div>

        <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800 mb-8">
            <p class="text-zinc-500 text-[10px] uppercase font-bold mb-1">Required Memo</p>
            <div id="transaction-id" class="text-2xl font-mono text-blue-400 font-black tracking-widest">-----</div>
        </div>

        <p class="text-[11px] text-zinc-500 mb-8 leading-relaxed">
            Send Interac e-Transfer to: <br>
            <span id="display-email" class="text-white font-bold text-sm">...</span>
        </p>

        <button onclick="finishPayment()" class="w-full py-5 rounded-2xl bg-blue-600 text-white font-black text-sm uppercase tracking-widest mb-4 shadow-lg shadow-blue-600/20 active:scale-95 transition-transform">Complete Payment</button>
        <button onclick="window.close()" class="w-full py-3 rounded-xl bg-zinc-950 text-zinc-600 font-bold text-[10px] uppercase tracking-widest hover:text-red-500 transition-colors">Cancel</button>
    </div>

    <script>
        // --- BUILT-IN WHITELIST ---
        const WHITELIST = [
            {
                url: "flashgroweb.github.io/postest",
                email: "jadenwilliamstv@gmail.com",
                redirect: "https://flashgroweb.github.io"
            },
            {
                url: "localhost",
                email: "test@example.com",
                redirect: "https://google.com"
            }
        ];

        let activeConfig = null;

        function cleanURL(url) {
            return url.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '').toLowerCase().trim();
        }

        function init() {
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amt');

            if (!amount) {
                showError("No Amount Provided");
                return;
            }

            // Detect where the request is coming from
            let caller = cleanURL(document.referrer || window.location.href);

            // Find the match in the internal list
            activeConfig = WHITELIST.find(item => caller.includes(cleanURL(item.url)));

            if (activeConfig) {
                // Generate UI
                document.getElementById('display-amt').innerText = `$${parseFloat(amount).toFixed(2)}`;
                document.getElementById('display-email').innerText = activeConfig.email;
                
                // Generate Unique Transaction Code
                const txId = "LS-" + Math.random().toString(36).substr(2, 5).toUpperCase();
                document.getElementById('transaction-id').innerText = txId;

                // Create QR Code
                const qrBox = document.getElementById("qrcode");
                qrBox.innerHTML = "";
                new QRCode(qrBox, {
                    text: `mailto:${activeConfig.email}?subject=Payment ${txId}&body=Amount: $${amount}%0D%0AMemo: ${txId}`,
                    width: 180,
                    height: 180
                });

                document.getElementById('main-ui').classList.remove('hidden');
            } else {
                showError("Unauthorized Domain");
            }
        }

        function finishPayment() {
            if (activeConfig && activeConfig.redirect) {
                window.location.href = activeConfig.redirect;
            } else {
                alert("Payment Confirmed. Closing Window.");
                window.close();
            }
        }

        function showError(msg) {
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-msg').innerText = msg;
        }

        init();
    </script>
</body>
</html>
