<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOPS | Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .payment-box { background: #0a0a0a; border: 1px solid #222; border-radius: 32px; padding: 2rem; width: 100%; max-width: 400px; }
        #error-screen { display: none; position: fixed; inset: 0; background: #000; z-index: 100; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div id="error-screen" class="flex flex-col p-10">
        <h1 class="text-red-500 font-black italic text-2xl mb-2">ACCESS DENIED</h1>
        <p id="error-msg" class="text-zinc-500 text-xs uppercase tracking-widest">Invalid Session or Unauthorized Domain</p>
    </div>

    <div id="main-ui" class="payment-box text-center hidden">
        <h1 class="text-xl font-black italic mb-6">SHOPS <span class="text-blue-500">PAY</span></h1>
        
        <div class="mb-8">
            <p class="text-zinc-500 text-[10px] uppercase tracking-[3px] mb-1">Total Amount</p>
            <div id="display-amt" class="text-5xl font-mono font-bold text-white">$0.00</div>
        </div>

        <div class="bg-white p-4 rounded-2xl inline-block mb-6">
            <div id="qrcode"></div>
        </div>

        <div class="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800 mb-6">
            <p class="text-zinc-500 text-[10px] uppercase font-bold mb-2">Required Memo</p>
            <div id="transaction-id" class="text-xl font-mono text-blue-400 font-bold tracking-widest">-----</div>
        </div>

        <p class="text-[11px] text-zinc-400 mb-6">
            Send Interac to: <br>
            <span id="display-email" class="text-white font-bold">...</span>
        </p>

        <button onclick="finishPayment()" class="w-full py-4 rounded-xl bg-blue-600 text-white font-black text-sm uppercase tracking-widest mb-3 shadow-lg shadow-blue-900/20">Complete Payment</button>
        <button onclick="window.close()" class="w-full py-3 rounded-xl bg-zinc-900 text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Cancel</button>
    </div>

    <script>
        const API_POOL = "https://raw.githubusercontent.com/FLASHGROWEB/pos/refs/heads/main/whitelist.txt";
        let redirectTarget = "";

        async function initCheckout() {
            const params = new URLSearchParams(window.location.search);
            const amount = params.get('amt');

            // 1. BLOCK if no amount is provided (preventing empty URL opening)
            if (!amount || amount === "0.00") {
                showError("No Amount Specified");
                return;
            }

            try {
                const response = await fetch(API_POOL);
                const data = await response.text();
                const lines = data.split('\n');

                // 2. Identify Domain + Path (handles /buzzfeed etc)
                const ref = document.referrer ? new URL(document.referrer) : window.location;
                const fullPath = ref.hostname + ref.pathname.replace(/\/$/, ""); 

                // 3. Find Match (Strict check)
                // We look for a line starting with the specific domain/path
                const match = lines.find(l => {
                    const domainPart = l.split(',')[0].trim();
                    return fullPath.startsWith(domainPart) || domainPart.startsWith("OFF_") === false && ref.hostname === domainPart;
                });

                if (match) {
                    const parts = match.split(',');
                    const domain = parts[0].trim();
                    const email = parts[1].trim();
                    redirectTarget = parts[2] ? parts[2].trim() : null;

                    // Check for the "OFF_" switch
                    if (domain.startsWith("OFF_")) {
                        showError("Service Temporarily Offline");
                        return;
                    }

                    // Success - Setup UI
                    document.getElementById('display-amt').innerText = `$${parseFloat(amount).toFixed(2)}`;
                    document.getElementById('display-email').innerText = email;
                    document.getElementById('main-ui').classList.remove('hidden');
                    
                    const txId = "LS-" + Math.random().toString(36).substr(2, 4).toUpperCase();
                    document.getElementById('transaction-id').innerText = txId;

                    new QRCode(document.getElementById("qrcode"), {
                        text: `mailto:${email}?subject=Pay ${txId}&body=Amount: $${amount}`,
                        width: 160, height: 160
                    });

                } else {
                    showError("Unauthorized Domain");
                }
            } catch (e) {
                showError("System Connection Error");
            }
        }

        function finishPayment() {
            if (redirectTarget) {
                // Redirect to the "Thank You" page provided in whitelist
                window.location.href = redirectTarget;
            } else {
                alert("Payment complete! You can now close this window.");
                window.close();
            }
        }

        function showError(msg) {
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-msg').innerText = msg;
        }

        initCheckout();
    </script>
</body>
</html>
